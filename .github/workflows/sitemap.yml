name: Generate sitemap

on:
  push:
    branches: [ main ]
    paths: [ '**/*.html' ] # HTMLファイルが変更・追加された時のみ実行

permissions:
  contents: write # リポジトリに sitemap.xml をプッシュするための権限

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 各ファイルの最終更新日を取得するために履歴を全てフェッチする

      - name: Generate the sitemap
        id: sitemap
        uses: cicirello/generate-sitemap@v1
        with:
          base-url-path: https://sorahanaproject.github.io/web/index.html
      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          # 変更がある場合のみコミットしてプッシュする
          git diff --staged --quiet || git commit -m "chore: update sitemap.xml"
          git push
